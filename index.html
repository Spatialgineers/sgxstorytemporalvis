<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SGX Story Time - Temporal Ubershader V2</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        body { 
            background-color: #010409; 
            color: #fff; 
            font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace; 
            overflow: hidden; 
            margin: 0; 
            touch-action: none; 
        }
        
        /* SGX Identity */
        .sgx-border { border: 1px solid #1f2937; }
        .sgx-accent { color: #FDCC0D; }
        .sgx-bg-accent { background-color: #FDCC0D; color: #000; }
        .sgx-panel { background: rgba(2, 8, 15, 0.85); backdrop-filter: blur(10px); }

        /* Tactical Sliders */
        input[type=range] { 
            -webkit-appearance: none; width: 100%; background: transparent; position: relative; z-index: 10;
        }
        input[type=range]::-webkit-slider-thumb { 
            -webkit-appearance: none; height: 18px; width: 18px; border-radius: 50%;
            background: #FDCC0D; cursor: pointer; border: 2px solid #000;
            box-shadow: 0 0 10px rgba(253,204,13,0.6); margin-top: -7px;
        }
        input[type=range]::-webkit-slider-runnable-track {
            width: 100%; height: 4px; cursor: pointer; background: #32527B; border-radius: 2px;
        }

        /* Specific Timeline Slider Styling */
        #decade-slider::-webkit-slider-thumb { height: 24px; width: 12px; border-radius: 2px; margin-top: -10px; }
        
        .timeline-container { position: relative; width: 100%; padding: 15px 0; }
        .decade-marker { position: absolute; top: -5px; font-size: 9px; color: #64748b; transform: translateX(-50%); }
        
        /* Layout */
        #webgl-container { position: absolute; top: 0; left: 0; width: 100vw; height: 100vh; z-index: 0; }
        canvas { display: block; width: 100%; height: 100%; object-fit: cover; }
        
        .ui-layer { position: absolute; z-index: 10; width: 100%; display: flex; flex-direction: column; justify-content: space-between; height: 100%; pointer-events: none; }
        .pointer-events-auto { pointer-events: auto; }
    </style>
</head>
<body>

    <!-- 3D Canvas -->
    <div id="webgl-container">
        <video id="camera-feed" class="hidden" autoplay playsinline muted></video>
        <canvas id="texture-canvas" class="hidden"></canvas>
    </div>

    <!-- UI Overlay -->
    <div class="ui-layer pb-6 pt-10 px-4 md:px-6">
        
        <!-- Header -->
        <div class="flex justify-between items-start pointer-events-auto">
            <div>
                <h1 class="text-xl md:text-2xl font-black italic tracking-tighter sgx-accent">SGX STORY</h1>
                <p class="text-[9px] md:text-[10px] tracking-[0.2em] text-gray-400">TEMPORAL ENGINE V2</p>
            </div>
            <div class="text-right">
                <div id="current-decade-display" class="text-3xl md:text-4xl font-black tracking-tighter text-white drop-shadow-[0_0_10px_rgba(253,204,13,0.5)]">2020s</div>
                <div id="decade-desc" class="text-[8px] md:text-[9px] text-[#32527B] uppercase tracking-widest font-bold">SGX Prístino</div>
            </div>
        </div>

        <!-- Controls (Bottom) -->
        <div class="pointer-events-auto sgx-panel sgx-border rounded-xl p-4 flex flex-col gap-3 max-w-md mx-auto w-full">
            
            <!-- Intensity & Scale -->
            <div class="grid grid-cols-2 gap-4 border-b border-gray-800 pb-3">
                <div>
                    <div class="flex justify-between text-[9px] font-mono font-bold text-gray-400 mb-1"><label>INTENSITY</label><span id="val-int" class="sgx-accent">1.00</span></div>
                    <input type="range" id="sl-int" min="0" max="2" step="0.05" value="1.0">
                </div>
                <div>
                    <div class="flex justify-between text-[9px] font-mono font-bold text-gray-400 mb-1"><label>SCALE / FREQ</label><span id="val-scale" class="sgx-accent">1.00</span></div>
                    <input type="range" id="sl-scale" min="0.1" max="3" step="0.1" value="1.0">
                </div>
            </div>

            <!-- Timeline Slider (1930 to 2030) -->
            <div class="timeline-container">
                <div class="relative w-full h-4 mb-2">
                    <span class="decade-marker" style="left: 0%;">30s</span>
                    <span class="decade-marker" style="left: 10%;">40s</span>
                    <span class="decade-marker" style="left: 20%;">50s</span>
                    <span class="decade-marker" style="left: 30%;">60s</span>
                    <span class="decade-marker" style="left: 40%;">70s</span>
                    <span class="decade-marker" style="left: 50%;">80s</span>
                    <span class="decade-marker" style="left: 60%;">90s</span>
                    <span class="decade-marker" style="left: 70%;">00s</span>
                    <span class="decade-marker" style="left: 80%;">10s</span>
                    <span class="decade-marker" style="left: 90%;">20s</span>
                    <span class="decade-marker" style="left: 100%;">30s</span>
                </div>
                <!-- 11 steps: 1930, 1940, 1950, 1960, 1970, 1980, 1990, 2000, 2010, 2020, 2030 -->
                <input type="range" id="decade-slider" min="1930" max="2030" step="10" value="2020">
            </div>

            <!-- Action Buttons -->
            <div class="flex gap-2 mt-1">
                <button id="btn-cam" class="flex-1 bg-[#1f2937] hover:bg-[#334155] text-white text-[10px] font-bold py-3 rounded tracking-widest transition-colors border border-gray-700">
                    INIT CAM
                </button>
                <button id="btn-photo" class="flex-1 bg-[#32527B] hover:bg-blue-600 text-white text-[10px] font-bold py-3 rounded tracking-widest transition-colors shadow-lg disabled:opacity-50" disabled>
                    CAPTURE
                </button>
                <button id="btn-record" class="flex-1 sgx-bg-accent hover:bg-yellow-400 text-[10px] font-bold py-3 rounded tracking-widest transition-colors shadow-[0_0_15px_rgba(253,204,13,0.3)] disabled:opacity-50" disabled>
                    REC
                </button>
            </div>
        </div>
    </div>

    <script>
        // --- 1. CORE DOM & STATE ---
        const video = document.getElementById('camera-feed');
        const texCanvas = document.getElementById('texture-canvas');
        const texCtx = texCanvas.getContext('2d', { willReadFrequently: true });
        const container = document.getElementById('webgl-container');
        
        const sliderDecade = document.getElementById('decade-slider');
        const sliderInt = document.getElementById('sl-int');
        const sliderScale = document.getElementById('sl-scale');
        
        const decadeDisplay = document.getElementById('current-decade-display');
        const decadeDesc = document.getElementById('decade-desc');
        const valInt = document.getElementById('val-int');
        const valScale = document.getElementById('val-scale');
        
        const btnCam = document.getElementById('btn-cam');
        const btnPhoto = document.getElementById('btn-photo');
        const btnRecord = document.getElementById('btn-record');

        let isStreamActive = false;

        const decadeMeta = {
            1930: "Sepia / Celluloid Scratches",
            1940: "Noir B&W / Heavy Grain",
            1950: "Early Technicolor / 2-Strip",
            1960: "Kodachrome / Warm Fade",
            1970: "Psychedelic / Light Leaks",
            1980: "VHS / CRT Tracking",
            1990: "Camcorder / Data Mosh",
            2000: "Y2K Digital / Bloom",
            2010: "Insta Filter / Teal & Orange",
            2020: "SGX Cyberpunk / High Contrast",
            2030: "Neural AR / Edge Glow"
        };

        // --- 2. THREE.JS UBERSHADER SETUP ---
        const scene = new THREE.Scene();
        const camera = new THREE.OrthographicCamera(-1, 1, 1, -1, 0, 1);
        const renderer = new THREE.WebGLRenderer({ antialias: false, preserveDrawingBuffer: true });
        renderer.setPixelRatio(window.devicePixelRatio);
        container.appendChild(renderer.domElement);

        const videoTexture = new THREE.CanvasTexture(texCanvas);
        videoTexture.minFilter = THREE.LinearFilter;
        videoTexture.magFilter = THREE.LinearFilter;

        function resize() {
            const width = window.innerWidth;
            const height = window.innerHeight;
            renderer.setSize(width, height);
            if(shaderMat) {
                shaderMat.uniforms.u_resolution.value.set(width, height);
            }
        }
        window.addEventListener('resize', resize);

        const vertexShader = `
            varying vec2 vUv; 
            void main() { 
                vUv = uv; 
                gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0); 
            }
        `;

        // THE KERNEL: 11 Decades parameterized by Intensity and Scale.
        const fragmentShader = `
            uniform sampler2D tDiffuse;
            uniform float u_time;
            uniform float u_decade;
            uniform float u_intensity;
            uniform float u_scale;
            uniform vec2 u_resolution;

            varying vec2 vUv;

            // Utility functions
            float rand(vec2 co) { return fract(sin(dot(co.xy ,vec2(12.9898,78.233))) * 43758.5453); }
            float getLuma(vec3 color) { return dot(color, vec3(0.299, 0.587, 0.114)); }
            
            // RGB Split for VHS/Glitch modulated by Intensity
            vec3 rgbSplit(sampler2D tex, vec2 uv, float splitAmount) {
                float r = texture2D(tex, vec2(uv.x + splitAmount, uv.y)).r;
                float g = texture2D(tex, uv).g;
                float b = texture2D(tex, vec2(uv.x - splitAmount, uv.y)).b;
                return vec3(r, g, b);
            }

            void main() {
                vec2 uv = vUv;
                vec3 color = texture2D(tDiffuse, uv).rgb;
                float time = u_time;
                float luma = getLuma(color);
                
                vec3 finalColor = color;
                
                // Base noise modulated by scale and time
                float noise = (rand(uv * time * u_scale) - 0.5);

                // --- DECADE LOGIC PIPELINE ---

                if (u_decade < 1935.0) {
                    // 1930s: Sepia, Scratches, Frame Jump
                    // Jump logic (Intensity controls how often, Scale controls jump height)
                    if (fract(time * 2.0) > (1.0 - 0.1 * u_intensity)) {
                        uv.y = fract(uv.y + (rand(vec2(time)) * 0.1 * u_scale));
                        color = texture2D(tDiffuse, uv).rgb;
                        luma = getLuma(color);
                    }
                    // Sepia Tint
                    vec3 sepia = vec3(1.2, 1.0, 0.8) * luma;
                    finalColor = mix(vec3(luma), sepia, u_intensity);
                    
                    // Procedural Scratches
                    float scratch = fract(sin(uv.x * 100.0 * u_scale) * time);
                    if (scratch < 0.01 * u_intensity) finalColor += vec3(0.2);
                    
                    finalColor += noise * 0.2 * u_intensity;
                    finalColor *= smoothstep(1.5, 0.4 - (0.2 * u_intensity), length(uv - 0.5)); // Heavy Vig
                }
                else if (u_decade < 1945.0) {
                    // 1940s: Noir B&W, High Contrast, Heavy Grain
                    float contrast = 1.0 + (1.0 * u_intensity);
                    float bw = (luma - 0.5) * contrast + 0.5;
                    finalColor = vec3(bw);
                    finalColor += noise * 0.4 * u_intensity; 
                    finalColor *= smoothstep(1.2, 0.3, length(uv - 0.5));
                } 
                else if (u_decade < 1955.0) {
                    // 1950s: Technicolor 2-Strip (Red/Green emphasis)
                    vec3 tc = vec3(color.r * 1.2, color.g * 1.1, color.b * 0.7);
                    tc = mix(vec3(luma), tc, 1.0 + (0.5 * u_intensity));
                    finalColor = mix(color, tc, u_intensity);
                    finalColor += noise * 0.15 * u_intensity;
                }
                else if (u_decade < 1965.0) {
                    // 1960s: Kodachrome Warm Fade
                    vec3 warm = vec3(luma * 1.2, luma * 0.9, luma * 0.6);
                    finalColor = mix(finalColor, warm, 0.6 * u_intensity);
                    finalColor.r *= 1.0 + (0.15 * u_intensity); 
                    finalColor.b *= 1.0 - (0.2 * u_intensity);
                    finalColor += noise * 0.1 * u_intensity;
                }
                else if (u_decade < 1975.0) {
                    // 1970s: Psychedelic Saturation & Light Leaks
                    finalColor = mix(vec3(luma), finalColor, 1.0 + (0.8 * u_intensity)); // Oversaturate
                    
                    // Light Leak driven by scale (size) and intensity (brightness)
                    float leak = sin(uv.x * (5.0 * u_scale) + time) * cos(uv.y * (3.0 * u_scale) + time * 0.5);
                    if(uv.x > 0.6) finalColor.r += max(0.0, leak * 0.4 * u_intensity);
                    finalColor *= vec3(1.0 + (0.1 * u_intensity), 1.0, 1.0 - (0.2 * u_intensity)); 
                }
                else if (u_decade < 1985.0) {
                    // 1980s: VHS
                    float scanline = sin(uv.y * (800.0 * u_scale)) * 0.04 * u_intensity;
                    
                    // Tracking jitter
                    if(fract(time * 0.5) > (1.0 - 0.1 * u_intensity) && uv.y > 0.8) {
                        uv.x += (rand(vec2(time)) - 0.5) * 0.1 * u_scale;
                    }
                    finalColor = rgbSplit(tDiffuse, uv, 0.008 * u_intensity);
                    finalColor -= scanline;
                    finalColor = mix(finalColor, vec3(getLuma(finalColor)), 0.3 * u_intensity); // Desat
                    finalColor *= vec3(1.0, 1.0 - (0.1 * u_intensity), 1.0 + (0.1 * u_intensity)); // Magenta shift
                }
                else if (u_decade < 1995.0) {
                    // 1990s: Camcorder / Data Mosh
                    float glitch = step(0.98 - (0.05 * u_intensity), sin(time * 10.0 + uv.y * (20.0 * u_scale))) * 0.05 * u_intensity;
                    uv.x += glitch;
                    finalColor = rgbSplit(tDiffuse, uv, 0.015 * u_intensity);
                    
                    // Low res pixelation simulation
                    float pixels = 150.0 / u_scale;
                    vec2 pixelUv = floor(uv * pixels) / pixels;
                    finalColor = mix(finalColor, texture2D(tDiffuse, pixelUv).rgb, u_intensity);
                }
                else if (u_decade < 2005.0) {
                    // 2000s: Early Digital / Bloom & Over-sharpen
                    vec2 texel = (1.0 / u_resolution) * u_scale * 3.0;
                    vec3 blur = texture2D(tDiffuse, uv + texel).rgb * 0.25 +
                                texture2D(tDiffuse, uv - texel).rgb * 0.25 +
                                texture2D(tDiffuse, uv + vec2(texel.x, -texel.y)).rgb * 0.25 +
                                texture2D(tDiffuse, uv + vec2(-texel.x, texel.y)).rgb * 0.25;
                    
                    // Sharpen trick: original + (original - blurred)
                    finalColor += (finalColor - blur) * (2.0 * u_intensity);
                    finalColor = mix(vec3(luma), finalColor, 1.0 + (0.5 * u_intensity)); // Sat
                }
                else if (u_decade < 2015.0) {
                    // 2010s: Insta Filter (Teal & Orange)
                    float tLuma = getLuma(finalColor);
                    vec3 shadows = vec3(0.05, 0.15, 0.25); // Teal
                    vec3 highlights = vec3(1.0, 0.85, 0.7); // Orange
                    vec3 graded = mix(shadows, highlights, tLuma);
                    finalColor = mix(color, graded, 0.8 * u_intensity);
                    finalColor += vec3(0.08 * u_intensity); // Faded blacks
                    finalColor *= smoothstep(1.5, 0.5 - (0.2 * u_scale), length(uv - 0.5));
                }
                else if (u_decade < 2025.0) {
                    // 2020s: SGX Prístino (Cyberpunk clean)
                    finalColor = rgbSplit(tDiffuse, uv, 0.003 * u_intensity * u_scale);
                    // Contrast
                    finalColor = (finalColor - 0.5) * (1.0 + 0.3 * u_intensity) + 0.5;
                    
                    // SGX Tint (Azul Metálico sombras, Amarillo Metálico highlights)
                    vec3 sgxBlue = vec3(0.2, 0.32, 0.48); // #32527B
                    vec3 sgxYellow = vec3(0.99, 0.8, 0.05); // #FDCC0D
                    if(luma < 0.5) finalColor = mix(finalColor, sgxBlue, 0.15 * u_intensity);
                    else finalColor = mix(finalColor, sgxYellow, 0.1 * u_intensity);
                }
                else {
                    // 2030s: Neural AR / Edge Glow
                    // Edge detection (Sobel approximation)
                    vec2 texel = (1.0 / u_resolution) * u_scale * 2.0;
                    float s00 = getLuma(texture2D(tDiffuse, uv + texel * vec2(-1, -1)).rgb);
                    float s22 = getLuma(texture2D(tDiffuse, uv + texel * vec2(1, 1)).rgb);
                    float s02 = getLuma(texture2D(tDiffuse, uv + texel * vec2(-1, 1)).rgb);
                    float s20 = getLuma(texture2D(tDiffuse, uv + texel * vec2(1, -1)).rgb);
                    float edge = abs(s00 - s22) + abs(s02 - s20);
                    
                    // Holographic Grid
                    float grid = sin(uv.x * 200.0 * u_scale) * sin(uv.y * 200.0 * u_scale);
                    grid = step(0.95, grid) * 0.2;
                    
                    vec3 arGlow = vec3(0.99, 0.8, 0.05) * edge * 5.0; // SGX Gold edges
                    vec3 baseDark = color * (1.0 - (0.5 * u_intensity)); // Darken base reality
                    
                    finalColor = mix(color, baseDark + arGlow + vec3(0.2, 0.32, 0.48)*grid, u_intensity);
                }

                gl_FragColor = vec4(clamp(finalColor, 0.0, 1.0), 1.0);
            }
        `;

        const shaderMat = new THREE.ShaderMaterial({
            uniforms: {
                tDiffuse: { value: videoTexture },
                u_time: { value: 0.0 },
                u_decade: { value: 2020.0 },
                u_intensity: { value: 1.0 },
                u_scale: { value: 1.0 },
                u_resolution: { value: new THREE.Vector2(window.innerWidth, window.innerHeight) }
            },
            vertexShader: vertexShader,
            fragmentShader: fragmentShader
        });

        const geometry = new THREE.PlaneGeometry(2, 2);
        const plane = new THREE.Mesh(geometry, shaderMat);
        scene.add(plane);

        const clock = new THREE.Clock();

        // --- 3. CAMERA & RENDER LOOP ---
        async function startCamera() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ 
                    video: { facingMode: "user", width: { ideal: 1280 }, height: { ideal: 720 } }, 
                    audio: false 
                });
                video.srcObject = stream;
                video.play();
                
                video.onloadedmetadata = () => {
                    texCanvas.width = video.videoWidth;
                    texCanvas.height = video.videoHeight;
                    resize();
                    isStreamActive = true;
                    btnCam.classList.add('hidden');
                    btnPhoto.disabled = false;
                    btnRecord.disabled = false;
                    drawFrame();
                };
            } catch (err) {
                console.error("Camera access denied or failed", err);
                alert("Necesitas habilitar la cámara para usar el SGX Temporal Engine.");
            }
        }

        function drawFrame() {
            if (!isStreamActive) return;
            requestAnimationFrame(drawFrame);

            if (video.readyState >= video.HAVE_CURRENT_DATA) {
                texCtx.drawImage(video, 0, 0, texCanvas.width, texCanvas.height);
                videoTexture.needsUpdate = true;
            }
            
            shaderMat.uniforms.u_time.value = clock.getElapsedTime();
            renderer.render(scene, camera);
        }

        // --- 4. UI INTERACTION (TWEAK ZONES) ---
        sliderDecade.addEventListener('input', (e) => {
            const val = e.target.value;
            decadeDisplay.innerText = val + "s";
            decadeDesc.innerText = decadeMeta[val] || "Custom Mode";
            shaderMat.uniforms.u_decade.value = parseFloat(val);
        });

        sliderInt.addEventListener('input', (e) => {
            valInt.innerText = parseFloat(e.target.value).toFixed(2);
            shaderMat.uniforms.u_intensity.value = parseFloat(e.target.value);
        });

        sliderScale.addEventListener('input', (e) => {
            valScale.innerText = parseFloat(e.target.value).toFixed(2);
            shaderMat.uniforms.u_scale.value = parseFloat(e.target.value);
        });

        btnCam.addEventListener('click', startCamera);

        // --- 5. CAPTURE LOGIC ---
        btnPhoto.addEventListener('click', () => {
            renderer.render(scene, camera);
            const dataURL = renderer.domElement.toDataURL('image/jpeg', 0.9);
            const a = document.createElement('a');
            a.href = dataURL;
            a.download = `SGX_Story_${sliderDecade.value}s_${Date.now()}.jpg`;
            a.click();
            
            const flash = document.createElement('div');
            flash.style.cssText = 'position:fixed;top:0;left:0;width:100vw;height:100vh;background:white;z-index:50;transition:opacity 0.5s;opacity:1;pointer-events:none;';
            document.body.appendChild(flash);
            setTimeout(() => { flash.style.opacity = '0'; }, 50);
            setTimeout(() => { document.body.removeChild(flash); }, 550);
        });

        let mediaRecorder;
        let recordedChunks = [];
        
        btnRecord.addEventListener('click', () => {
            if (mediaRecorder && mediaRecorder.state === 'recording') {
                mediaRecorder.stop();
                btnRecord.textContent = 'REC';
                btnRecord.classList.remove('bg-red-600', 'animate-pulse');
                btnRecord.classList.add('sgx-bg-accent');
                sliderDecade.disabled = false;
                sliderInt.disabled = false;
                sliderScale.disabled = false;
                return;
            }

            recordedChunks = [];
            const stream = renderer.domElement.captureStream(30);
            let mimeType = 'video/mp4';
            if (!MediaRecorder.isTypeSupported(mimeType)) {
                mimeType = 'video/webm; codecs=vp9';
                if (!MediaRecorder.isTypeSupported(mimeType)) mimeType = 'video/webm';
            }

            mediaRecorder = new MediaRecorder(stream, { mimeType: mimeType });
            mediaRecorder.ondataavailable = (e) => { if (e.data.size > 0) recordedChunks.push(e.data); };

            mediaRecorder.onstop = () => {
                const blob = new Blob(recordedChunks, { type: mimeType });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.style.display = 'none';
                a.href = url;
                a.download = `SGX_Video_${sliderDecade.value}s_I${sliderInt.value}_S${sliderScale.value}.webm`;
                document.body.appendChild(a);
                a.click();
                setTimeout(() => { document.body.removeChild(a); window.URL.revokeObjectURL(url); }, 100);
            };

            mediaRecorder.start();
            
            btnRecord.textContent = 'STOP';
            btnRecord.classList.remove('sgx-bg-accent');
            btnRecord.classList.add('bg-red-600', 'animate-pulse');
            sliderDecade.disabled = true;
            sliderInt.disabled = true; 
            sliderScale.disabled = true;
        });

        resize();
    </script>
</body>
</html>
